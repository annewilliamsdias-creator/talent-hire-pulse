<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent+ Hire Pulse</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --charcoal:   #0E0F17;
  --deep-blue:  #1F5C93;
  --deep-purple:#291B39;
  --teal:       #34BAC6;
  --gold:       #E9982B;
  --off-white:  #FBFBFA;
  --teal-dim:   rgba(52,186,198,0.12);
  --gold-dim:   rgba(233,152,43,0.12);
  --blue-dim:   rgba(31,92,147,0.15);
  --white10:    rgba(251,251,250,0.10);
  --white20:    rgba(251,251,250,0.20);
  --white60:    rgba(251,251,250,0.60);
  --shadow-lg:  0 24px 64px rgba(0,0,0,0.45);
  --shadow-md:  0 8px 32px rgba(0,0,0,0.25);
  --shadow-sm:  0 2px 12px rgba(0,0,0,0.15);
  --radius:     12px;
  --radius-sm:  7px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--charcoal);
  color:var(--off-white);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── NOISE TEXTURE OVERLAY ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.6;
}

/* ══════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════ */
#loginScreen{
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  background: radial-gradient(ellipse at 30% 50%, rgba(41,27,57,0.9) 0%, var(--charcoal) 70%);
}
.login-card{
  width:420px;max-width:90vw;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:20px;
  padding:52px 44px;
  backdrop-filter:blur(20px);
  box-shadow:var(--shadow-lg);
  text-align:center;
  animation:fadeUp .6s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.login-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:38px;font-weight:700;
  letter-spacing:-1px;
  color:var(--off-white);
  line-height:1;
  margin-bottom:6px;
}
.login-logo .plus{color:var(--teal)}
.login-logo .hire{color:var(--gold)}
.login-sub{
  font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--white60);margin-bottom:40px;font-weight:400;
}
.login-divider{
  width:40px;height:2px;
  background:linear-gradient(90deg,var(--teal),var(--gold));
  margin:0 auto 36px;border-radius:2px;
}
.login-btn{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--deep-blue),var(--deep-purple));
  border:1px solid rgba(52,186,198,0.3);
  border-radius:var(--radius-sm);
  color:var(--off-white);
  font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:600;
  cursor:pointer;letter-spacing:.5px;
  transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.login-btn:hover{
  background:linear-gradient(135deg,#2470b3,#3d2860);
  border-color:var(--teal);
  box-shadow:0 0 24px rgba(52,186,198,0.2);
  transform:translateY(-1px);
}
.login-btn svg{width:20px;height:20px}
.login-footer{
  margin-top:36px;font-size:10px;
  color:rgba(251,251,250,0.3);letter-spacing:.3px;
}
.login-status{
  margin-top:16px;font-size:12px;
  color:var(--teal);min-height:18px;
}

/* ══════════════════════════════════════
   APP SHELL
══════════════════════════════════════ */
#appShell{display:none;min-height:100vh;position:relative;z-index:1}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:64px;
  background:rgba(41,27,57,0.95);
  border-right:1px solid rgba(255,255,255,0.06);
  display:flex;flex-direction:column;align-items:center;
  padding:20px 0;gap:4px;
  z-index:200;
  backdrop-filter:blur(20px);
  transition:width .25s cubic-bezier(.4,0,.2,1);
}
.sidebar:hover{width:220px}
.sidebar-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:700;
  color:var(--off-white);
  white-space:nowrap;overflow:hidden;
  width:100%;padding:0 20px;
  margin-bottom:20px;
  opacity:0;transition:opacity .2s .1s;
}
.sidebar:hover .sidebar-logo{opacity:1}
.sidebar-logo .plus{color:var(--teal)}
.sidebar-logo .hire{color:var(--gold)}

.nav-item{
  width:calc(100% - 16px);
  display:flex;align-items:center;gap:14px;
  padding:11px 20px;
  border-radius:var(--radius-sm);
  cursor:pointer;color:var(--white60);
  transition:all .18s;
  white-space:nowrap;overflow:hidden;
  position:relative;
}
.nav-item:hover,.nav-item.active{
  background:var(--white10);
  color:var(--off-white);
}
.nav-item.active{
  background:var(--blue-dim);
  color:var(--teal);
  border-left:2px solid var(--teal);
  padding-left:18px;
}
.nav-icon{
  width:20px;height:20px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.nav-label{
  font-size:13px;font-weight:500;
  opacity:0;transition:opacity .15s;
  pointer-events:none;
}
.sidebar:hover .nav-label{opacity:1}
.nav-badge{
  margin-left:auto;background:var(--gold);
  color:var(--charcoal);font-size:10px;font-weight:700;
  padding:2px 6px;border-radius:10px;
  opacity:0;transition:opacity .15s;
}
.sidebar:hover .nav-badge{opacity:1}
.sidebar-spacer{flex:1}
.sidebar-user{
  width:calc(100% - 16px);
  padding:11px 20px;
  display:flex;align-items:center;gap:12px;
  white-space:nowrap;overflow:hidden;
}
.user-avatar{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--deep-blue),var(--teal));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
}
.user-info{opacity:0;transition:opacity .15s}
.sidebar:hover .user-info{opacity:1}
.user-name{font-size:12px;font-weight:600;color:var(--off-white)}
.user-role{font-size:10px;color:var(--white60);margin-top:1px}

/* ── MAIN CONTENT ── */
.main{
  margin-left:64px;
  min-height:100vh;
  transition:margin-left .25s;
}
.topbar{
  height:60px;
  background:rgba(14,15,23,0.8);
  border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(20px);
}
.topbar-title{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:700;
  color:var(--off-white);
  display:flex;align-items:center;gap:10px;
  letter-spacing:-0.5px;
}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-stat{
  font-size:12px;color:var(--white60);
  display:flex;align-items:center;gap:6px;
}
.topbar-stat strong{color:var(--gold);font-size:14px}
.sp-status{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:500;
  padding:5px 12px;border-radius:20px;
}
.sp-status.connected{background:rgba(52,186,198,0.12);color:var(--teal)}
.sp-status.connecting{background:var(--gold-dim);color:var(--gold)}
.sp-status.error{background:rgba(220,50,50,0.12);color:#ff6b6b}
.sp-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

.content{padding:32px}

/* ── PANELS ── */
.panel{display:none;animation:fadeIn .3s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ══════════════════════════════════════
   CARDS & LAYOUT
══════════════════════════════════════ */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--radius);
  padding:28px 32px;
  margin-bottom:20px;
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;
}
.card-title{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:600;
  color:var(--off-white);
  display:flex;align-items:center;gap:10px;
}
.card-title .accent{color:var(--teal)}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--radius);
  padding:22px 24px;
  position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .2s;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
}
.stat-card.blue::before{background:linear-gradient(90deg,var(--deep-blue),var(--teal))}
.stat-card.gold::before{background:linear-gradient(90deg,var(--gold),#f4b84a)}
.stat-card.teal::before{background:linear-gradient(90deg,var(--teal),#5dd5df)}
.stat-card.purple::before{background:linear-gradient(90deg,var(--deep-purple),#6b4a9e)}
.stat-num{
  font-family:'Cormorant Garamond',serif;
  font-size:42px;font-weight:700;line-height:1;
  margin-bottom:6px;
}
.stat-card.blue .stat-num{color:var(--teal)}
.stat-card.gold .stat-num{color:var(--gold)}
.stat-card.teal .stat-num{color:#5dd5df}
.stat-card.purple .stat-num{color:#9b72d4}
.stat-label{font-size:12px;font-weight:500;color:var(--white60);letter-spacing:.3px}
.stat-sub{font-size:11px;color:rgba(251,251,250,0.35);margin-top:4px}

/* ══════════════════════════════════════
   SECTION LABELS
══════════════════════════════════════ */
.section-label{
  font-size:10px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:var(--teal);
  margin:24px 0 14px;
  display:flex;align-items:center;gap:10px;
}
.section-label::after{
  content:'';flex:1;height:1px;
  background:rgba(52,186,198,0.2);
}

/* ══════════════════════════════════════
   FORMS
══════════════════════════════════════ */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:6px}
.field.span2{grid-column:span 2}
.field.span3{grid-column:span 3}
label{
  font-size:11px;font-weight:600;
  letter-spacing:.8px;text-transform:uppercase;
  color:var(--white60);
}
label .req{color:var(--gold);margin-left:2px}
input,select,textarea{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:var(--radius-sm);
  padding:10px 14px;
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  color:var(--off-white);
  transition:border-color .2s,box-shadow .2s,background .2s;
  width:100%;
}
input:focus,select:focus,textarea:focus{
  outline:none;
  border-color:var(--teal);
  background:rgba(52,186,198,0.06);
  box-shadow:0 0 0 3px rgba(52,186,198,0.12);
}
input::placeholder{color:rgba(251,251,250,0.25)}
select option{background:var(--charcoal);color:var(--off-white)}
textarea{resize:vertical;min-height:80px}
.field-error{
  font-size:11px;color:#ff6b6b;margin-top:2px;
  display:none;
}
.field-error.visible{display:block}
.field-hint{font-size:11px;color:rgba(251,251,250,0.35);margin-top:2px}

/* ══════════════════════════════════════
   BUTTONS
══════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 20px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;
  cursor:pointer;border:none;
  font-family:'DM Sans',sans-serif;
  transition:all .18s;letter-spacing:.3px;
}
.btn-primary{
  background:linear-gradient(135deg,var(--deep-blue),#2470b3);
  color:var(--off-white);
  border:1px solid rgba(52,186,198,0.3);
}
.btn-primary:hover{
  background:linear-gradient(135deg,#2470b3,#2d7fc8);
  box-shadow:0 4px 16px rgba(31,92,147,0.4);
  transform:translateY(-1px);
}
.btn-teal{
  background:linear-gradient(135deg,var(--teal),#2ca8b4);
  color:var(--charcoal);
}
.btn-teal:hover{box-shadow:0 4px 16px rgba(52,186,198,0.35);transform:translateY(-1px)}
.btn-gold{
  background:linear-gradient(135deg,var(--gold),#d4891f);
  color:var(--charcoal);
}
.btn-gold:hover{box-shadow:0 4px 16px rgba(233,152,43,0.35);transform:translateY(-1px)}
.btn-ghost{
  background:transparent;color:var(--white60);
  border:1px solid rgba(255,255,255,0.12);
}
.btn-ghost:hover{background:var(--white10);color:var(--off-white)}
.btn-danger{
  background:rgba(220,50,50,0.15);color:#ff6b6b;
  border:1px solid rgba(220,50,50,0.25);
}
.btn-danger:hover{background:rgba(220,50,50,0.25)}
.btn-sm{padding:7px 14px;font-size:12px}
.btn-lg{padding:13px 28px;font-size:14px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* ── BUTTON ROW ── */
.btn-row{display:flex;gap:10px;align-items:center;margin-top:24px}

/* ══════════════════════════════════════
   ALERTS & TOASTS
══════════════════════════════════════ */
.alert{
  padding:12px 16px;border-radius:var(--radius-sm);
  margin-bottom:16px;font-size:13px;
  display:flex;align-items:flex-start;gap:10px;
  border:1px solid;
}
.alert-success{background:rgba(52,186,198,0.1);border-color:rgba(52,186,198,0.3);color:var(--teal)}
.alert-error{background:rgba(220,50,50,0.1);border-color:rgba(220,50,50,0.3);color:#ff6b6b}
.alert-warn{background:var(--gold-dim);border-color:rgba(233,152,43,0.3);color:var(--gold)}
.alert-info{background:var(--blue-dim);border-color:rgba(31,92,147,0.3);color:#5b9fd4}

#toast{
  position:fixed;bottom:28px;right:28px;z-index:9999;
  max-width:360px;
  background:rgba(14,15,23,0.95);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:var(--radius);
  padding:16px 20px;
  font-size:13px;color:var(--off-white);
  box-shadow:var(--shadow-lg);
  backdrop-filter:blur(20px);
  transform:translateY(100px);opacity:0;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  display:flex;align-items:flex-start;gap:12px;
}
#toast.show{transform:translateY(0);opacity:1}
#toast .toast-icon{font-size:18px;flex-shrink:0;margin-top:1px}
#toast .toast-msg{flex:1}
#toast .toast-title{font-weight:600;margin-bottom:2px}
#toast .toast-sub{font-size:11px;color:var(--white60)}

/* ══════════════════════════════════════
   CODE DISPLAY
══════════════════════════════════════ */
.code-display-wrap{
  background:rgba(52,186,198,0.08);
  border:1px solid rgba(52,186,198,0.25);
  border-radius:var(--radius);
  padding:24px 28px;
  text-align:center;
  margin-top:20px;
}
.code-label{
  font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--white60);margin-bottom:10px;
}
.code-value{
  font-family:'DM Mono',monospace;
  font-size:28px;font-weight:500;
  color:var(--teal);letter-spacing:2px;
}
.code-copy-btn{margin-top:14px}

/* ══════════════════════════════════════
   LOOKUP / CANDIDATE CARD
══════════════════════════════════════ */
.lookup-bar{
  display:flex;align-items:flex-end;gap:12px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--radius);
  padding:20px 24px;
  margin-bottom:20px;
}
.lookup-bar .field{flex:1}
.candidate-card{
  background:rgba(31,92,147,0.12);
  border:1px solid rgba(31,92,147,0.3);
  border-radius:var(--radius);
  padding:20px 24px;
  display:flex;align-items:center;gap:18px;
  margin-bottom:20px;
}
.cand-avatar{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--deep-blue),var(--teal));
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:700;color:#fff;flex-shrink:0;
}
.cand-info h3{font-size:16px;font-weight:600;color:var(--off-white);margin-bottom:3px}
.cand-info p{font-size:12px;color:var(--white60)}
.cand-meta{margin-left:auto;text-align:right;display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.cand-code{
  font-family:'DM Mono',monospace;
  font-size:11px;color:var(--teal);
  background:var(--teal-dim);
  padding:3px 10px;border-radius:20px;
  border:1px solid rgba(52,186,198,0.2);
}

/* ══════════════════════════════════════
   STATUS BADGES
══════════════════════════════════════ */
.badge{
  display:inline-block;padding:3px 10px;
  border-radius:20px;font-size:11px;font-weight:600;
  letter-spacing:.3px;
}
.badge-wip{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(233,152,43,0.25)}
.badge-joined{background:rgba(52,186,198,0.12);color:var(--teal);border:1px solid rgba(52,186,198,0.25)}
.badge-rejected{background:rgba(220,50,50,0.12);color:#ff6b6b;border:1px solid rgba(220,50,50,0.2)}
.badge-selected{background:rgba(52,186,198,0.15);color:#5dd5df;border:1px solid rgba(93,213,223,0.25)}
.badge-offered{background:var(--blue-dim);color:#5b9fd4;border:1px solid rgba(91,159,212,0.25)}
.badge-hold{background:rgba(155,114,212,0.12);color:#9b72d4;border:1px solid rgba(155,114,212,0.25)}
.badge-dropped{background:rgba(255,255,255,0.06);color:var(--white60);border:1px solid rgba(255,255,255,0.1)}
.badge-consultant{background:rgba(31,92,147,0.2);color:#5b9fd4;border:1px solid rgba(31,92,147,0.3)}
.badge-progress{background:var(--blue-dim);color:#5b9fd4;border:1px solid rgba(31,92,147,0.25)}

/* ══════════════════════════════════════
   DATA TABLE
══════════════════════════════════════ */
.table-wrap{overflow-x:auto;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:rgba(31,92,147,0.25)}
thead th{
  padding:12px 14px;text-align:left;
  font-size:10px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  color:var(--white60);white-space:nowrap;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
tbody tr{
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:background .15s;
}
tbody tr:hover{background:rgba(255,255,255,0.04)}
tbody td{
  padding:11px 14px;color:var(--off-white);
  vertical-align:middle;
}
tbody td.muted{color:var(--white60);font-size:11px}
tbody td.mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--teal)}

/* ══════════════════════════════════════
   LOADING OVERLAY
══════════════════════════════════════ */
#loadingOverlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(14,15,23,0.85);
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);
}
#loadingOverlay.show{display:flex}
.spinner{
  width:40px;height:40px;
  border:3px solid rgba(52,186,198,0.2);
  border-top-color:var(--teal);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{
  margin-top:16px;font-size:13px;color:var(--white60);
  text-align:center;
}

/* ══════════════════════════════════════
   DUPLICATE WARNING MODAL
══════════════════════════════════════ */
#dupModal{
  position:fixed;inset:0;z-index:800;
  background:rgba(14,15,23,0.8);
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);
}
#dupModal.show{display:flex}
.dup-card{
  background:rgba(30,25,45,0.98);
  border:1px solid rgba(233,152,43,0.3);
  border-radius:var(--radius);
  padding:32px 36px;max-width:480px;width:90vw;
  box-shadow:var(--shadow-lg);
  animation:fadeUp .3s ease;
}
.dup-card h3{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;color:var(--gold);margin-bottom:8px;
}
.dup-card p{font-size:13px;color:var(--white60);margin-bottom:20px;line-height:1.6}
.dup-record{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--radius-sm);
  padding:14px 16px;margin-bottom:20px;
  font-size:13px;
}
.dup-record strong{color:var(--off-white)}
.dup-record span{color:var(--white60);font-size:12px}

/* ══════════════════════════════════════
   PENDING DASHBOARD
══════════════════════════════════════ */
.pending-item{
  display:flex;align-items:center;gap:16px;
  padding:14px 16px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--radius-sm);
  margin-bottom:8px;
  transition:all .18s;cursor:pointer;
}
.pending-item:hover{background:rgba(255,255,255,0.06);border-color:rgba(52,186,198,0.2)}
.pending-item.overdue{border-left:3px solid #ff6b6b}
.pending-item.today{border-left:3px solid var(--gold)}
.pending-item.upcoming{border-left:3px solid var(--teal)}
.pending-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pending-dot.overdue{background:#ff6b6b}
.pending-dot.today{background:var(--gold)}
.pending-dot.upcoming{background:var(--teal)}
.pending-name{font-size:13px;font-weight:600;color:var(--off-white)}
.pending-detail{font-size:11px;color:var(--white60);margin-top:2px}
.pending-date{margin-left:auto;font-size:11px;font-family:'DM Mono',monospace;color:var(--white60);text-align:right}
.pending-date.overdue{color:#ff6b6b}
.pending-date.today{color:var(--gold)}

/* ══════════════════════════════════════
   SCROLLBAR
══════════════════════════════════════ */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media(max-width:768px){
  .sidebar{width:56px}.main{margin-left:56px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .form-grid,.form-grid.three{grid-template-columns:1fr}
  .field.span2,.field.span3{grid-column:span 1}
  .content{padding:16px}
}

/* ── LOGO ── */
.logo-img {
  width: 56px; height: 56px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(52,186,198,0.3);
  display: block;
}
.logo-img-sm {
  width: 32px; height: 32px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid rgba(52,186,198,0.2);
  flex-shrink: 0;
}
.logo-img-topbar {
  width: 28px; height: 28px;
  border-radius: 50%;
  object-fit: cover;
}
.login-logo-wrap {
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
  margin-bottom: 8px;
}

.upload-zone {
  border: 2px dashed rgba(255,255,255,0.12);
  border-radius: var(--radius);
  padding: 40px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  background: rgba(255,255,255,0.02);
}
.upload-zone:hover {
  border-color: var(--teal);
  background: rgba(52,186,198,0.04);
}
.admin-tab.active {
  color: var(--teal) !important;
  border-bottom-color: var(--teal) !important;
}

/* misc helpers */
.hidden{display:none!important}
.flex{display:flex}.gap8{gap:8px}.gap12{gap:12px}
.mt8{margin-top:8px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.mb0{margin-bottom:0!important}
.text-teal{color:var(--teal)}.text-gold{color:var(--gold)}
.text-muted{color:var(--white60)}
.fw600{font-weight:600}
.mono{font-family:'DM Mono',monospace}
</style>
</head>
